spring.application.name=PDF Replacer
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB
server.error.include-message=never
server.port=${PORT:8080}
pdfreplacer.limits.max-pages=250
pdfreplacer.limits.max-search-length=300
pdfreplacer.limits.max-replacement-length=300
pdfreplacer.limits.max-files=10
pdfreplacer.limits.max-file-size-bytes=26214400
pdfreplacer.limits.max-total-upload-bytes=104857600
pdfreplacer.limits.max-total-pages=1000
pdfreplacer.rate-limit.requests-per-minute=60
pdfreplacer.contact.to-email=sarveshthapa007@gmail.com
pdfreplacer.contact.from-email=${MAIL_FROM:no-reply@pdfbolt.local}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
