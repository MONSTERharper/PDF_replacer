spring.application.name=PDFBolt Suite
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=60MB
server.error.include-message=never
server.port=${PORT:8080}
boltreplacer.limits.max-pages=250
boltreplacer.limits.max-search-length=300
boltreplacer.limits.max-replacement-length=300
boltreplacer.limits.max-files=10
boltreplacer.limits.max-file-size-bytes=26214400
boltreplacer.limits.max-total-upload-bytes=104857600
boltreplacer.limits.max-total-pages=1000
boltreplacer.rate-limit.requests-per-minute=60
boltreplacer.contact.to-email=sarveshthapa007@gmail.com
boltreplacer.contact.from-email=${MAIL_FROM:no-reply@pdfbolt.local}
boltreplacer.contact.log-only=${CONTACT_LOG_ONLY:false}
spring.mail.host=${SMTP_HOST:}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:true}
